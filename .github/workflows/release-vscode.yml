name: Release VS Code Extension

on:
  push:
    tags: ['vscode-v*']
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release-vscode-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - run: bun install

      # Extension's copy-runtime step inlines the renderer bundle (media/rpui.js),
      # so the renderer must be built before the extension is packaged.
      - name: Build renderer runtime
        run: bun run --cwd packages/renderer-web build

      - name: Sync root dist/ (copy-runtime reads ../../dist/rpui.js)
        run: cp packages/renderer-web/dist/*.js dist/

      - name: Resolve version
        id: ver
        working-directory: packages/vscode-extension
        run: |
          PKG_VERSION="$(node -p "require('./package.json').version")"
          echo "package=$PKG_VERSION" >> "$GITHUB_OUTPUT"
          if [ "${GITHUB_REF_TYPE}" = "tag" ]; then
            TAG_VERSION="${GITHUB_REF_NAME#vscode-v}"
            echo "Tag version: $TAG_VERSION  ·  package.json version: $PKG_VERSION"
            if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
              echo "::error::Tag ${GITHUB_REF_NAME} does not match package.json version ${PKG_VERSION}. Bump packages/vscode-extension/package.json or retag."
              exit 1
            fi
            echo "version=$TAG_VERSION" >> "$GITHUB_OUTPUT"
            echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          else
            echo "version=$PKG_VERSION" >> "$GITHUB_OUTPUT"
            echo "tag=vscode-v$PKG_VERSION" >> "$GITHUB_OUTPUT"
          fi

      - name: Package .vsix
        working-directory: packages/vscode-extension
        run: |
          bun run build
          bunx @vscode/vsce package --no-dependencies \
            --out "rpml-vscode-extension-${{ steps.ver.outputs.version }}.vsix"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.ver.outputs.tag }}
          name: RPML VS Code Extension ${{ steps.ver.outputs.version }}
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: packages/vscode-extension/rpml-vscode-extension-${{ steps.ver.outputs.version }}.vsix
