name: Release VS Code Extension

on:
  push:
    tags: ['vscode-v*']
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release-vscode-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - run: bun install

      # Extension's copy-runtime step inlines the renderer bundle (media/rpui.js),
      # so the renderer must be built before the extension is packaged.
      - name: Build renderer runtime
        run: bun run --cwd packages/renderer-web build

      - name: Sync root dist/ (copy-runtime reads ../../dist/rpui.js)
        run: |
          mkdir -p dist
          cp packages/renderer-web/dist/*.js dist/

      - name: Resolve version
        id: ver
        working-directory: packages/vscode-extension
        run: |
          PKG_VERSION="$(node -p "require('./package.json').version")"
          echo "package=$PKG_VERSION" >> "$GITHUB_OUTPUT"
          if [ "${GITHUB_REF_TYPE}" = "tag" ]; then
            TAG_VERSION="${GITHUB_REF_NAME#vscode-v}"
            echo "Tag version: $TAG_VERSION  ·  package.json version: $PKG_VERSION"
            if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
              echo "::error::Tag ${GITHUB_REF_NAME} does not match package.json version ${PKG_VERSION}. Bump packages/vscode-extension/package.json or retag."
              exit 1
            fi
            echo "version=$TAG_VERSION" >> "$GITHUB_OUTPUT"
            echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          else
            echo "version=$PKG_VERSION" >> "$GITHUB_OUTPUT"
            echo "tag=vscode-v$PKG_VERSION" >> "$GITHUB_OUTPUT"
          fi

      - name: Package .vsix
        id: pkg
        working-directory: packages/vscode-extension
        run: |
          bun run build
          VSIX="rpml-vscode-extension-${{ steps.ver.outputs.version }}.vsix"
          bunx @vscode/vsce package --no-dependencies --out "$VSIX"
          # Fail loudly if packaging produced nothing — never publish an empty release.
          if [ ! -s "$VSIX" ]; then
            echo "::error::Expected $VSIX was not produced by vsce package."
            exit 1
          fi
          echo "Packaged $(du -h "$VSIX" | cut -f1) → $VSIX"
          echo "vsix=packages/vscode-extension/$VSIX" >> "$GITHUB_OUTPUT"

      # For manual dispatch, create the tag so the release is anchored to a ref.
      - name: Ensure tag exists (manual dispatch)
        if: github.event_name == 'workflow_dispatch'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${{ steps.ver.outputs.tag }}"
          if ! git rev-parse -q --verify "refs/tags/$TAG" >/dev/null; then
            git tag "$TAG"
            git push origin "$TAG"
          fi

      # Idempotent: drop any prior release for this tag (keeps the tag), then
      # recreate it with the .vsix attached. Uses the runner's built-in gh CLI
      # (no third-party action, authenticated via GITHUB_TOKEN).
      - name: Publish GitHub Release with .vsix
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${{ steps.ver.outputs.tag }}"
          VSIX="${{ steps.pkg.outputs.vsix }}"
          gh release delete "$TAG" --yes --cleanup-tag=false 2>/dev/null || true
          gh release create "$TAG" \
            --title "RPML VS Code Extension ${{ steps.ver.outputs.version }}" \
            --generate-notes \
            "$VSIX"
          echo "Release $TAG published with asset $(basename "$VSIX")."
