name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - run: bun install

      - name: Validate examples
        run: bash tools/validate-examples.sh

      - run: bun run --cwd packages/renderer-web build

      - name: Build site (spec/ + agent/ → docs/*.html)
        run: bun run site

      - name: Assemble docs/
        run: |
          mkdir -p docs/dist
          cp packages/renderer-web/dist/rpui.js docs/dist/rpui.js
          cp packages/renderer-web/dist/rpml-loader.js docs/dist/rpml-loader.js
          cp packages/renderer-web/dist/gallery.js docs/dist/gallery.js
          cp preview/components.js docs/components.js
          cp llms.txt docs/llms.txt
          cp -r examples docs/examples

      - uses: actions/configure-pages@v4

      - uses: actions/upload-pages-artifact@v3
        with:
          path: docs/

      - id: deployment
        uses: actions/deploy-pages@v4
