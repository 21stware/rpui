<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RPUI — Rapid Prototype UI</title>
  <script type="module" src="./rpui.js"></script>
  <style>
    :root { --b: #e5e7eb; --muted: #6b7280; --pri: #2563eb; }
    * { box-sizing: border-box; }
    body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; color: #111827; background: #f4f6f8; }

    /* top bar */
    .site-header { display: flex; align-items: center; gap: 16px; padding: 0 24px; height: 52px; background: #fff; border-bottom: 1px solid var(--b); position: sticky; top: 0; z-index: 100; }
    .site-logo { font-size: 15px; font-weight: 700; letter-spacing: -0.02em; color: #111827; text-decoration: none; }
    .site-logo span { color: var(--pri); }
    .site-nav { display: flex; gap: 4px; margin-left: auto; }
    .site-nav a { font-size: 13px; color: var(--muted); text-decoration: none; padding: 5px 10px; border-radius: 6px; }
    .site-nav a:hover { background: #f3f4f6; color: #111827; }
    .site-nav a.active { background: #eff6ff; color: var(--pri); font-weight: 600; }
    .site-nav a.gh { display: flex; align-items: center; gap: 5px; }

    /* tab content areas */
    .tab-panel { display: none; }
    .tab-panel.active { display: block; }

    /* ── COMPONENT BROWSER (reused from preview) ── */
    .px-app { display: grid; grid-template-columns: 280px 1fr; height: calc(100vh - 52px); }
    .px-side { display: flex; flex-direction: column; border-right: 1px solid var(--b); background: #fff; min-height: 0; }
    .px-side-head { padding: 16px 16px 10px; border-bottom: 1px solid var(--b); }
    .px-side-head h2 { margin: 0 0 10px; font-size: 15px; letter-spacing: -0.01em; }
    .px-search { width: 100%; height: 34px; padding: 0 11px; border: 1px solid var(--b); border-radius: 8px; font-size: 13px; outline: none; }
    .px-search:focus { border-color: var(--pri); box-shadow: 0 0 0 3px rgba(37,99,235,.12); }
    .px-list { flex: 1; overflow-y: auto; padding: 8px; }
    .px-group-label { padding: 10px 8px 4px; font-size: 11px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .04em; }
    .px-item { display: flex; align-items: center; gap: 8px; padding: 6px 10px; border-radius: 7px; font-size: 13px; color: #374151; cursor: pointer; font-family: ui-monospace, Menlo, monospace; }
    .px-item:hover { background: #f3f4f6; }
    .px-item.active { background: #eff6ff; color: #1d4ed8; font-weight: 650; }
    .px-count { color: var(--muted); font-size: 11px; padding: 4px 10px 10px; }
    .px-main { overflow-y: auto; min-height: 0; padding: 32px 40px 80px; }
    .px-title { margin: 0 0 2px; font-size: 24px; font-family: ui-monospace, Menlo, monospace; letter-spacing: -0.02em; }
    .px-group-tag { display: inline-block; margin-bottom: 20px; font-size: 12px; color: var(--muted); }
    .px-card { border: 1px solid var(--b); border-radius: 12px; background: #fff; margin-bottom: 20px; overflow: hidden; }
    .px-card-head { padding: 9px 14px; font-size: 12px; font-weight: 650; color: var(--muted); border-bottom: 1px solid var(--b); background: #fafbfc; }
    .px-render { padding: 24px; display: flex; flex-wrap: wrap; gap: 14px; align-items: flex-start; }
    .px-code { margin: 0; padding: 14px 16px; font-family: ui-monospace, Menlo, monospace; font-size: 12.5px; line-height: 1.6; color: #334155; background: #f8fafc; white-space: pre-wrap; word-break: break-word; }
    table.px-attrs { width: 100%; border-collapse: collapse; }
    .px-attrs th, .px-attrs td { text-align: left; padding: 9px 16px; font-size: 13px; border-bottom: 1px solid var(--b); }
    .px-attrs th { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: .04em; }
    .px-attrs tr:last-child td { border-bottom: 0; }
    .px-attrs td:first-child { font-family: ui-monospace, Menlo, monospace; color: #1d4ed8; white-space: nowrap; width: 1%; }
    .px-empty { color: var(--muted); padding: 40px; text-align: center; }

    /* ── DEMO GALLERY ── */
    .demo-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(340px, 1fr)); gap: 20px; padding: 32px 40px 80px; }
    .demo-card { border: 1px solid var(--b); border-radius: 12px; background: #fff; overflow: hidden; text-decoration: none; color: inherit; display: flex; flex-direction: column; transition: box-shadow .15s; }
    .demo-card:hover { box-shadow: 0 4px 16px rgba(0,0,0,.08); }
    .demo-thumb { height: 200px; overflow: hidden; background: #f8fafc; position: relative; }
    .demo-thumb iframe { width: 1440px; height: 900px; border: none; transform-origin: top left; pointer-events: none; }
    .demo-info { padding: 16px; border-top: 1px solid var(--b); }
    .demo-info h3 { margin: 0 0 4px; font-size: 14px; }
    .demo-info p { margin: 0; font-size: 12px; color: var(--muted); }
    .demo-info a { display: inline-block; margin-top: 10px; font-size: 12px; color: var(--pri); text-decoration: none; }
    .demo-info a:hover { text-decoration: underline; }
  </style>
</head>

<script>
function switchTab(name, el) {
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.site-nav a[data-tab]').forEach(a => a.classList.remove('active'));
  document.getElementById('tab-' + name).classList.add('active');
  el.classList.add('active');
  // scale demo iframes on first reveal
  if (name === 'demos') scaleDemoIframes();
}

function scaleDemoIframes() {
  document.querySelectorAll('.demo-thumb').forEach(thumb => {
    const iframe = thumb.querySelector('iframe');
    if (!iframe || iframe._scaled) return;
    iframe._scaled = true;
    const scale = thumb.offsetWidth / 1440;
    iframe.style.transform = `scale(${scale})`;
    iframe.style.height = (200 / scale) + 'px';
  });
}
window.addEventListener('resize', scaleDemoIframes);
</script>

<script type="module">
import { COMPONENTS } from './components.js';

const listEl = document.getElementById('px-list');
const mainEl = document.getElementById('px-main');
const searchEl = document.getElementById('px-search');
const countEl = document.getElementById('px-count');
let active = COMPONENTS[0]?.name;

function esc(s) { return s.replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }

function filtered(q) {
  q = q.trim().toLowerCase();
  return q ? COMPONENTS.filter(c => c.name.toLowerCase().includes(q) || c.group.toLowerCase().includes(q)) : COMPONENTS;
}

function renderList(q) {
  const items = filtered(q);
  countEl.textContent = items.length + ' / ' + COMPONENTS.length + ' 个组件';
  if (!items.length) { listEl.innerHTML = '<div class="px-empty">无匹配</div>'; return; }
  let html = '', lastGroup = null;
  for (const c of items) {
    if (c.group !== lastGroup) { html += '<div class="px-group-label">' + esc(c.group) + '</div>'; lastGroup = c.group; }
    html += '<div class="px-item' + (c.name === active ? ' active' : '') + '" data-name="' + c.name + '">' + esc(c.name) + '</div>';
  }
  listEl.innerHTML = html;
  listEl.querySelectorAll('.px-item').forEach(el => el.addEventListener('click', () => { active = el.dataset.name; renderList(searchEl.value); renderMain(); }));
}

function renderMain() {
  const c = COMPONENTS.find(x => x.name === active);
  if (!c) { mainEl.innerHTML = '<div class="px-empty">选择左侧组件查看</div>'; return; }
  const rows = c.attrs.map(([a, d]) => '<tr><td>' + esc(a) + '</td><td>' + esc(d) + '</td></tr>').join('');
  mainEl.innerHTML =
    '<h2 class="px-title">' + esc(c.name) + '</h2>' +
    '<span class="px-group-tag">' + esc(c.group) + '</span>' +
    '<div class="px-card"><div class="px-card-head">渲染预览</div><div class="px-render">' + c.html + '</div></div>' +
    '<div class="px-card"><div class="px-card-head">属性</div><table class="px-attrs"><thead><tr><th>属性</th><th>说明</th></tr></thead><tbody>' + rows + '</tbody></table></div>' +
    '<div class="px-card"><div class="px-card-head">源码</div><pre class="px-code">' + esc(c.html) + '</pre></div>';
}

searchEl.addEventListener('input', () => {
  const items = filtered(searchEl.value);
  if (items.length && !items.find(x => x.name === active)) { active = items[0].name; renderMain(); }
  renderList(searchEl.value);
});

renderList('');
renderMain();
</script>
