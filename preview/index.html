<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RPUI Dev Preview</title>
  <script type="module" src="/src/rpui.ts"></script>
  <style>
    body { padding: 32px; }
    .preview-shell { display: grid; gap: 28px; max-width: 1280px; }
    .preview-head { display: grid; gap: 8px; }
    .preview-head h1 { margin: 0; font-size: 32px; letter-spacing: -0.03em; }
    .preview-head p { margin: 0; color: #4b5563; font-size: 15px; }
    .preview-section { display: grid; gap: 14px; padding: 20px; border: 1px solid #e5e7eb; border-radius: 14px; background: #fff; box-shadow: 0 8px 24px rgba(15, 23, 42, .05); }
    .preview-section h2 { margin: 0; font-size: 18px; }
    .preview-grid { display: flex; align-items: flex-start; flex-wrap: wrap; gap: 14px; }
    .preview-column { display: grid; gap: 12px; }
    .preview-frame { border: 1px solid #d1d5db; border-radius: 12px; overflow: hidden; width: fit-content; }
  </style>
</head>
<body>
  <div class="preview-shell">
    <div class="preview-head">
      <h1>RPUI Dev Preview</h1>
      <p>Source-mode component preview. Run <code>npm run dev</code>; this page imports <code>/src/rpui.ts</code> directly.</p>
    </div>

    <section class="preview-section">
      <h2>Canvas</h2>
      <div class="preview-frame">
        <rp-main-view device="mobile" scale="0.72">
          <rp-viewport device="mobile">
            <rp-navbar height="56" data-pin="1"><rp-logo label="APP"></rp-logo><rp-badge count="8"></rp-badge></rp-navbar>
            <rp-panel padding="16" data-pin="2">
              <rp-search state="filled" value="demo" has-clear-button></rp-search>
              <rp-table rows="3" columns="名称,状态" has-checkbox></rp-table>
            </rp-panel>
          </rp-viewport>
        </rp-main-view>
      </div>
    </section>

    <section class="preview-section">
      <h2>Buttons and Controls</h2>
      <div class="preview-grid">
        <rp-button label="Primary" variant="primary" icon="plus"></rp-button>
        <rp-button label="Secondary" variant="secondary"></rp-button>
        <rp-button label="Ghost" variant="ghost"></rp-button>
        <rp-button label="Danger" variant="danger" icon="trash-2"></rp-button>
        <rp-button label="Loading" state="loading"></rp-button>
        <rp-input label="Name" state="focus" value="张三" has-clear-button></rp-input>
        <rp-select label="Role" state="expanded" value="管理员" options="所有者,管理员,成员,访客"></rp-select>
        <rp-checkbox state="checked" label="checked"></rp-checkbox>
        <rp-checkbox state="indeterminate" label="mixed"></rp-checkbox>
        <rp-radio state="checked" label="radio"></rp-radio>
        <rp-toggle state="on" label="enabled"></rp-toggle>
      </div>
    </section>

    <section class="preview-section">
      <h2>Navigation and Layout</h2>
      <div class="preview-grid">
        <rp-navbar height="56"><rp-logo></rp-logo><rp-breadcrumb items="首页,设置,成员"></rp-breadcrumb><rp-avatar initials="RP"></rp-avatar></rp-navbar>
        <rp-sidebar width="220"><rp-list><rp-list-item label="团队成员" icon="users" badge="128" state="selected"></rp-list-item><rp-list-item label="安全策略" icon="settings"></rp-list-item></rp-list></rp-sidebar>
        <rp-tabs active="1"><rp-tab label="概览"></rp-tab><rp-tab label="成员" badge="12"></rp-tab><rp-tab label="审计"></rp-tab></rp-tabs>
        <rp-pagination total="128" current="2" page-size="20"></rp-pagination>
        <rp-steps steps="填写信息,分配角色,发送邀请" active="1"></rp-steps>
      </div>
    </section>

    <section class="preview-section">
      <h2>Data Display</h2>
      <div class="preview-column">
        <rp-layout columns="repeat(3, minmax(180px, 1fr))" gap="12">
          <rp-stat-card label="成员" value="128" trend="up" change="+12"></rp-stat-card>
          <rp-stat-card label="风险" value="3" trend="down" change="待处理"></rp-stat-card>
          <rp-card title="管理员" subtitle="管理成员与角色" has-footer><rp-tag label="推荐" color="green"></rp-tag></rp-card>
        </rp-layout>
        <rp-table rows="4" columns="成员,邮箱,角色,状态" has-checkbox has-action></rp-table>
        <rp-bulk-action-bar count="3" actions="归档,删除,取消"></rp-bulk-action-bar>
      </div>
    </section>

    <section class="preview-section">
      <h2>Feedback and Overlays</h2>
      <div class="preview-grid">
        <rp-alert type="info" title="提示" message="信息提示"></rp-alert>
        <rp-alert type="success" title="成功" message="操作完成"></rp-alert>
        <rp-alert type="warning" title="警告" message="请确认风险"></rp-alert>
        <rp-alert type="error" title="错误" message="加载失败"></rp-alert>
        <rp-empty label="暂无数据" description="创建后会显示在这里" has-action></rp-empty>
        <rp-loading rows="4"></rp-loading>
        <rp-upload state="uploading" progress="60"></rp-upload>
        <rp-progress value="64"></rp-progress>
        <rp-tooltip text="提示气泡"></rp-tooltip>
        <rp-dropdown title="菜单"><rp-list-item label="编辑" icon="settings"></rp-list-item><rp-list-item label="删除" icon="trash-2"></rp-list-item></rp-dropdown>
        <rp-modal title="确认操作" has-footer><rp-alert type="warning" title="不可恢复" message="请确认后继续"></rp-alert></rp-modal>
        <rp-drawer title="详情" width="320"><rp-form><rp-form-item label="名称"><rp-input value="张三"></rp-input></rp-form-item><rp-form-item label="状态"><rp-toggle state="on" label="启用"></rp-toggle></rp-form-item></rp-form></rp-drawer>
      </div>
    </section>

    <section class="preview-section">
      <h2>Enum Description</h2>
      <rp-enum>
        <rp-enum-item label="默认" description="正常数据态，用户可以继续操作。"><rp-alert type="info" title="默认状态"></rp-alert></rp-enum-item>
        <rp-enum-item label="错误" description="服务端或网络异常时展示。"><rp-alert type="error" title="加载失败" message="请稍后重试"></rp-alert></rp-enum-item>
      </rp-enum>
    </section>
  </div>
</body>
</html>
