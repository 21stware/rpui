<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RPUI 组件浏览器</title>
  <script type="module" src="/packages/renderer-web/src/rpui.ts"></script>
  <style>
    :root { --b: #e5e7eb; --muted: #6b7280; --pri: #2563eb; }
    * { box-sizing: border-box; }
    body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; color: #111827; background: #f4f6f8; }
    .px-app { display: grid; grid-template-columns: 280px 1fr; height: 100vh; }
    /* sidebar */
    .px-side { display: flex; flex-direction: column; border-right: 1px solid var(--b); background: #fff; min-height: 0; }
    .px-side-head { padding: 16px 16px 10px; border-bottom: 1px solid var(--b); }
    .px-side-head h1 { margin: 0 0 10px; font-size: 16px; letter-spacing: -0.01em; }
    .px-search { width: 100%; height: 34px; padding: 0 11px; border: 1px solid var(--b); border-radius: 8px; font-size: 13px; outline: none; }
    .px-search:focus { border-color: var(--pri); box-shadow: 0 0 0 3px rgba(37,99,235,.12); }
    .px-list { flex: 1; overflow-y: auto; padding: 8px; }
    .px-group-label { padding: 10px 8px 4px; font-size: 11px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .04em; }
    .px-item { display: flex; align-items: center; gap: 8px; padding: 6px 10px; border-radius: 7px; font-size: 13px; color: #374151; cursor: pointer; font-family: ui-monospace, Menlo, monospace; }
    .px-item:hover { background: #f3f4f6; }
    .px-item.active { background: #eff6ff; color: #1d4ed8; font-weight: 650; }
    .px-count { color: var(--muted); font-size: 11px; padding: 4px 10px 10px; }
    /* main */
    .px-main { overflow-y: auto; min-height: 0; padding: 32px 40px 80px; }
    .px-title { margin: 0 0 2px; font-size: 24px; font-family: ui-monospace, Menlo, monospace; letter-spacing: -0.02em; }
    .px-group-tag { display: inline-block; margin-bottom: 20px; font-size: 12px; color: var(--muted); }
    .px-card { border: 1px solid var(--b); border-radius: 12px; background: #fff; margin-bottom: 20px; overflow: hidden; }
    .px-card-head { padding: 9px 14px; font-size: 12px; font-weight: 650; color: var(--muted); border-bottom: 1px solid var(--b); background: #fafbfc; }
    .px-render { padding: 24px; display: flex; flex-wrap: wrap; gap: 14px; align-items: flex-start; }
    .px-code { margin: 0; padding: 14px 16px; font-family: ui-monospace, Menlo, monospace; font-size: 12.5px; line-height: 1.6; color: #334155; background: #f8fafc; white-space: pre-wrap; word-break: break-word; }
    table.px-attrs { width: 100%; border-collapse: collapse; }
    .px-attrs th, .px-attrs td { text-align: left; padding: 9px 16px; font-size: 13px; border-bottom: 1px solid var(--b); }
    .px-attrs th { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: .04em; }
    .px-attrs tr:last-child td { border-bottom: 0; }
    .px-attrs td:first-child { font-family: ui-monospace, Menlo, monospace; color: #1d4ed8; white-space: nowrap; width: 1%; }
    .px-empty { color: var(--muted); padding: 40px; text-align: center; }
  </style>
</head>
<body>
  <div class="px-app">
    <aside class="px-side">
      <div class="px-side-head">
        <h1>RPUI 组件浏览器</h1>
        <input class="px-search" type="search" placeholder="搜索组件…" id="px-search" autocomplete="off" />
      </div>
      <nav class="px-list" id="px-list"></nav>
      <div class="px-count" id="px-count"></div>
    </aside>
    <main class="px-main" id="px-main"></main>
  </div>

  <script type="module">
    import { COMPONENTS } from './components.js';

    const listEl = document.getElementById('px-list');
    const mainEl = document.getElementById('px-main');
    const searchEl = document.getElementById('px-search');
    const countEl = document.getElementById('px-count');
    let active = COMPONENTS[0]?.name;

    function escapeHtml(s) { return s.replace(/[&<>"]/g, c => ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;' }[c])); }

    function filtered(q) {
      q = q.trim().toLowerCase();
      if (!q) return COMPONENTS;
      return COMPONENTS.filter(c => c.name.toLowerCase().includes(q) || c.group.toLowerCase().includes(q));
    }

    function renderList(q) {
      const items = filtered(q);
      countEl.textContent = items.length + ' / ' + COMPONENTS.length + ' 个组件';
      if (!items.length) { listEl.innerHTML = '<div class="px-empty">无匹配</div>'; return; }
      let html = '', lastGroup = null;
      for (const c of items) {
        if (c.group !== lastGroup) { html += '<div class="px-group-label">' + escapeHtml(c.group) + '</div>'; lastGroup = c.group; }
        html += '<div class="px-item' + (c.name === active ? ' active' : '') + '" data-name="' + c.name + '">' + escapeHtml(c.name) + '</div>';
      }
      listEl.innerHTML = html;
      listEl.querySelectorAll('.px-item').forEach(el => el.addEventListener('click', () => { active = el.dataset.name; renderList(searchEl.value); renderMain(); }));
    }

    function renderMain() {
      const c = COMPONENTS.find(x => x.name === active);
      if (!c) { mainEl.innerHTML = '<div class="px-empty">选择左侧组件查看</div>'; return; }
      const attrsRows = c.attrs.map(([a, d]) => '<tr><td>' + escapeHtml(a) + '</td><td>' + escapeHtml(d) + '</td></tr>').join('');
      mainEl.innerHTML =
        '<h2 class="px-title">' + escapeHtml(c.name) + '</h2>' +
        '<span class="px-group-tag">' + escapeHtml(c.group) + '</span>' +
        '<div class="px-card"><div class="px-card-head">渲染预览</div><div class="px-render">' + c.html + '</div></div>' +
        '<div class="px-card"><div class="px-card-head">属性</div><table class="px-attrs"><thead><tr><th>属性</th><th>说明</th></tr></thead><tbody>' + attrsRows + '</tbody></table></div>' +
        '<div class="px-card"><div class="px-card-head">源码</div><pre class="px-code">' + escapeHtml(c.html) + '</pre></div>';
    }

    searchEl.addEventListener('input', () => {
      const items = filtered(searchEl.value);
      if (items.length && !items.find(x => x.name === active)) { active = items[0].name; renderMain(); }
      renderList(searchEl.value);
    });

    renderList('');
    renderMain();
  </script>
</body>
</html>
