<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RPML Viewer</title>
  <style>
    body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
    #drop {
      position: fixed; inset: 0; z-index: 9999;
      display: none; align-items: center; justify-content: center;
      background: rgba(37, 99, 235, .08); border: 3px dashed #2563eb;
      color: #1d4ed8; font-size: 22px; font-weight: 600; pointer-events: none;
    }
    #drop.over { display: flex; }
    .rpml-hint { max-width: 560px; margin: 80px auto; padding: 0 24px; color: #374151; line-height: 1.7; }
    .rpml-hint h1 { font-size: 20px; margin: 0 0 12px; }
    .rpml-hint code { background: #f3f4f6; padding: 2px 6px; border-radius: 4px; font-size: 13px; }
    .rpml-hint .drop-zone { margin-top: 24px; padding: 40px; border: 2px dashed #cbd5e1; border-radius: 12px; text-align: center; color: #6b7280; background: #f8fafc; cursor: pointer; }
    .rpml-hint .err { color: #dc2626; margin-top: 16px; }
    .rpml-hint ul { margin-top: 20px; padding: 0; list-style: none; columns: 2; gap: 16px; }
    .rpml-hint a { color: #2563eb; text-decoration: none; }
  </style>
</head>
<body>
  <div id="drop">松开以加载 .rpml 文件或文件夹</div>

  <div class="rpml-hint" id="hint">
    <h1>RPML Viewer</h1>
    <p>拖拽单个 <code>.rpml</code> 文件查看，或拖拽<strong>文件夹</strong>构建带侧边栏的文档集；也可用 URL 参数 <code>?rpml=../examples/04-ticket-desk.rpml</code></p>
    <div class="drop-zone" id="picker">点击选择 .rpml 文件，或拖拽文件 / 文件夹到此处</div>
    <input type="file" id="file" accept=".rpml,.xml,text/plain" style="display:none" />
    <ul>
      <li><a href="?rpml=../examples/01-minimal.rpml">01 最小示例</a></li>
      <li><a href="?rpml=../examples/02-form-page.rpml">02 注册表单</a></li>
      <li><a href="?rpml=../examples/03-list-with-filter.rpml">03 商品列表</a></li>
      <li><a href="?rpml=../examples/04-ticket-desk.rpml">04 工单服务台</a></li>
      <li><a href="?rpml=../examples/05-dashboard.rpml">05 数据看板</a></li>
      <li><a href="?rpml=../examples/06-multi-step-wizard.rpml">06 多步骤向导</a></li>
      <li><a href="?rpml=../examples/07-task-management.rpml">07 任务管理看板</a></li>
      <li><a href="?rpml=../examples/08-mobile-chat.rpml">08 移动端即时消息</a></li>
      <li><a href="?rpml=../examples/09-golden-reference.rpml">09 黄金参考</a></li>
    </ul>
    <div class="err" id="err"></div>
  </div>

  <script type="module">
    import { parseToPage } from '../dist/rpml-loader.js';
    import { mountGallery } from '../dist/gallery.js';

    const hint = document.getElementById('hint');
    const errEl = document.getElementById('err');
    const drop = document.getElementById('drop');
    const fileInput = document.getElementById('file');
    const picker = document.getElementById('picker');

    // ── single document ──
    function renderOne(source) {
      let page;
      try { page = parseToPage(source); }
      catch (e) { errEl.textContent = 'RPML 解析错误：' + e.message; return; }
      document.body.innerHTML = '';
      document.body.appendChild(page);
    }

    function loadFile(file) {
      if (!file) return;
      const reader = new FileReader();
      reader.onload = () => renderOne(String(reader.result));
      reader.onerror = () => { errEl.textContent = '文件读取失败'; };
      reader.readAsText(file);
    }

    // ── folder → gallery ──
    function readEntryFile(entry) {
      return new Promise((res, rej) => entry.file(f => {
        const r = new FileReader();
        r.onload = () => res(String(r.result));
        r.onerror = rej;
        r.readAsText(f);
      }, rej));
    }

    function readDir(dirEntry) {
      const reader = dirEntry.createReader();
      return new Promise((resolve, reject) => {
        const all = [];
        const pump = () => reader.readEntries(batch => {
          if (!batch.length) return resolve(all);
          all.push(...batch);
          pump();
        }, reject);
        pump();
      });
    }

    // Walk a directory entry recursively, collecting { path, source } for .rpml files.
    async function collectRpml(entry, prefix, out) {
      if (entry.isFile) {
        if (/\.rpml$/i.test(entry.name)) out.push({ path: prefix + entry.name, source: await readEntryFile(entry) });
        return;
      }
      const children = await readDir(entry);
      for (const child of children) await collectRpml(child, prefix + entry.name + '/', out);
    }

    async function loadFolder(rootEntry) {
      const docs = [];
      // Use the dropped folder's contents as the gallery root (strip the top dir name).
      const children = await readDir(rootEntry);
      for (const child of children) await collectRpml(child, '', docs);
      if (!docs.length) { errEl.textContent = '文件夹内没有 .rpml 文件'; return; }
      docs.sort((a, b) => a.path.localeCompare(b.path));
      mountGallery(docs);
    }

    // ── URL param ──
    const src = new URLSearchParams(location.search).get('rpml');
    if (src) {
      hint.remove();
      fetch(src).then(r => { if (!r.ok) throw new Error('HTTP ' + r.status); return r.text(); })
        .then(renderOne)
        .catch(e => { document.body.innerHTML = '<div class="rpml-hint err">加载失败：' + e.message + '</div>'; });
    }

    picker.addEventListener('click', () => fileInput.click());
    fileInput.addEventListener('change', () => loadFile(fileInput.files[0]));

    // ── drag and drop (file or folder) ──
    let depth = 0;
    window.addEventListener('dragenter', e => { e.preventDefault(); depth++; drop.classList.add('over'); });
    window.addEventListener('dragover', e => e.preventDefault());
    window.addEventListener('dragleave', e => { e.preventDefault(); if (--depth <= 0) drop.classList.remove('over'); });
    window.addEventListener('drop', e => {
      e.preventDefault(); depth = 0; drop.classList.remove('over');
      const item = e.dataTransfer?.items?.[0];
      const entry = item?.webkitGetAsEntry?.();
      if (entry?.isDirectory) { loadFolder(entry); return; }
      const file = e.dataTransfer?.files?.[0];
      if (file) loadFile(file);
    });
  </script>
</body>
</html>
