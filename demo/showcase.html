<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>即时消息 — RPUI Mobile Demo</title>
  <script type="module" src="../dist/rpui.js"></script>
</head>
<body>
  <rp-page
    title="即时消息"
    route="/chat"
    description="移动端即时通讯 App 的消息列表页，涵盖会话列表、搜索、通知权限、已读未读状态、群聊与单聊区分、AI 助手入口和置顶会话逻辑。主快照为有新消息、搜索聚焦、通知弹层可见状态。">

    <rp-main-view device="mobile" scale="0.9">
      <rp-viewport device="mobile">
        <rp-navbar height="56" data-pin="1">
          <rp-logo label="IM" size="40"></rp-logo>
          <rp-search state="focus" placeholder="搜索聊天、联系人" has-clear-button></rp-search>
          <rp-badge count="8" max="99"></rp-badge>
          <rp-avatar size="32" initials="WZ"></rp-avatar>
        </rp-navbar>

        <rp-layout rows="auto auto 1fr auto">
          <rp-panel padding="10" data-pin="2">
            <rp-layout columns="repeat(4, 1fr)" gap="8">
              <rp-button label="消息" variant="primary" size="sm" icon="message-square"></rp-button>
              <rp-button label="通讯录" variant="ghost" size="sm" icon="users"></rp-button>
              <rp-button label="AI 助手" variant="ghost" size="sm" icon="shield"></rp-button>
              <rp-button label="更多" variant="ghost" size="sm" icon="settings"></rp-button>
            </rp-layout>
          </rp-panel>

          <rp-panel padding="10" data-pin="3">
            <rp-alert type="info" title="开启通知权限" message="允许后可即时接收新消息提醒" closable></rp-alert>
          </rp-panel>

          <rp-panel padding="0" data-pin="4">
            <rp-list>
              <rp-list-item label="产品 · 王总 📌" icon="message-square" badge="5" state="selected"></rp-list-item>
              <rp-list-item label="张三" icon="user" badge="2"></rp-list-item>
              <rp-list-item label="研发群 (38人)" icon="users" badge="99+"></rp-list-item>
              <rp-list-item label="AI 助手" icon="shield"></rp-list-item>
              <rp-list-item label="李四" icon="user"></rp-list-item>
              <rp-list-item label="设计评审群" icon="users" badge="1"></rp-list-item>
              <rp-list-item label="运营 · 周报" icon="message-square"></rp-list-item>
              <rp-list-item label="安全通知" icon="bell"></rp-list-item>
            </rp-list>
          </rp-panel>

          <rp-panel padding="0" data-pin="5">
            <rp-layout columns="repeat(4, 1fr)" gap="0">
              <rp-button label="消息" variant="primary" size="sm" icon="inbox"></rp-button>
              <rp-button label="通讯录" variant="ghost" size="sm" icon="users"></rp-button>
              <rp-button label="发现" variant="ghost" size="sm" icon="search"></rp-button>
              <rp-button label="我的" variant="ghost" size="sm" icon="user"></rp-button>
            </rp-layout>
          </rp-panel>
        </rp-layout>
      </rp-viewport>
    </rp-main-view>

    <rp-annotation id="1" label="顶部搜索与头像">
      搜索框在主快照中为 focus 态，表示用户已点击准备输入。Logo 为品牌标识。通知角标显示未读汇总数。
      <rp-enum>
        <rp-enum-item label="默认态" description="用户未进行任何搜索操作。"><rp-search placeholder="搜索聊天、联系人"></rp-search></rp-enum-item>
        <rp-enum-item label="输入中" description="已有输入关键词，出现清除按钮。"><rp-search state="filled" value="王总" has-clear-button></rp-search></rp-enum-item>
        <rp-enum-item label="无结果"><rp-empty label="未找到相关内容" description="换个关键词试试"></rp-empty></rp-enum-item>
      </rp-enum>
    </rp-annotation>

    <rp-annotation id="2" label="快捷功能区">
      四宫格快捷入口，当前选中「消息」为 primary 态，其余为 ghost 态。未来可扩展为可配置顺序。
    </rp-annotation>

    <rp-annotation id="3" label="通知权限横幅">
      首次打开或授权被拒绝后展示，用户可点击关闭按钮忽略。通知内容取决于系统推送是否授权。
      <rp-enum>
        <rp-enum-item label="未授权时可见" description="状态持久展示直到用户关闭或授权。"><rp-alert type="info" title="开启通知权限" message="允许后可即时接收新消息提醒" closable></rp-alert></rp-enum-item>
        <rp-enum-item label="已授权时隐藏"><rp-empty label="无横幅" description="横幅已关闭，不占据界面空间"></rp-empty></rp-enum-item>
      </rp-enum>
    </rp-annotation>

    <rp-annotation id="4" label="会话列表">
      置顶会话（📌）固定在顶部，角标显示未读消息数，99+ 封顶。单聊头像使用 user 图标，群聊使用 users 图标。AI 助手是系统特殊会话，独占一个图标。
      <rp-annotation label="未读状态规则">
        <rp-enum>
          <rp-enum-item label="未读（有角标）" description="展示红色角标，超过 99 显示 99+。"><rp-list-item label="研发群" icon="users" badge="99+"></rp-list-item></rp-enum-item>
          <rp-enum-item label="已读（无角标）"><rp-list-item label="李四" icon="user"></rp-list-item></rp-enum-item>
          <rp-enum-item label="置顶会话" description="📌 前缀标识，且排列始终在列表最上方。"><rp-list-item label="产品 · 王总 📌" icon="message-square" badge="5" state="selected"></rp-list-item></rp-enum-item>
          <rp-enum-item label="勿扰模式" description="角标变灰，不高亮。"><rp-list-item label="运营 · 周报" icon="message-square" state="disabled"></rp-list-item></rp-enum-item>
        </rp-enum>
      </rp-annotation>
      <rp-annotation label="会话列表加载态">
        <rp-enum>
          <rp-enum-item label="首次加载骨架屏"><rp-loading rows="5"></rp-loading></rp-enum-item>
          <rp-enum-item label="空会话列表" description="新用户或清空后展示。"><rp-empty label="暂无会话" description="开始聊天吧" has-action></rp-empty></rp-enum-item>
          <rp-enum-item label="加载失败"><rp-alert type="error" title="消息加载失败" message="请检查网络后重试"></rp-alert></rp-enum-item>
        </rp-enum>
      </rp-annotation>
    </rp-annotation>

    <rp-annotation id="5" label="底部 Tab 导航">
      固定底栏，包含消息、通讯录、发现、我的四个 Tab。消息 Tab 为选中状态。底栏在 iOS Safe Area 以上。
      <rp-enum>
        <rp-enum-item label="消息 Tab 选中" description="primary 蓝色，代表当前活跃 Tab。"><rp-button label="消息" variant="primary" size="sm" icon="inbox"></rp-button></rp-enum-item>
        <rp-enum-item label="其他 Tab 未选中"><rp-button label="通讯录" variant="ghost" size="sm" icon="users"></rp-button></rp-enum-item>
        <rp-enum-item label="带红点" description="Tab 图标右上角有未读系统通知时展示。"><rp-badge count="3"></rp-badge></rp-enum-item>
      </rp-enum>
    </rp-annotation>
  </rp-page>
</body>
</html>
